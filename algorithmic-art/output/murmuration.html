<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Murmuration — Generative Flocking</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }

        .container {
            display: flex;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        .sidebar {
            width: 310px;
            flex-shrink: 0;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20,20,19,0.1);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar h1 {
            font-family: 'Lora', serif;
            font-size: 26px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .sidebar .subtitle {
            color: var(--anthropic-mid-gray);
            font-size: 12px;
            margin-bottom: 28px;
            line-height: 1.6;
        }

        .control-section { margin-bottom: 26px; }

        .control-section h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--anthropic-dark);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .control-section h3::before {
            content: '•';
            color: var(--anthropic-orange);
        }

        .seed-input {
            width: 100%;
            background: var(--anthropic-light);
            padding: 11px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 15px;
            margin-bottom: 10px;
            border: 1px solid var(--anthropic-light-gray);
            text-align: center;
            color: var(--anthropic-dark);
        }

        .seed-input:focus {
            outline: none;
            border-color: var(--anthropic-orange);
            background: white;
        }

        .seed-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .control-group { margin-bottom: 16px; }

        .control-group label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 7px;
        }

        .control-group label .hint {
            font-size: 11px;
            color: var(--anthropic-mid-gray);
            font-weight: 400;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            height: 3px;
            background: var(--anthropic-light-gray);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
            cursor: pointer;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.15s ease;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .slider-container input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }

        .value-display {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            min-width: 44px;
            text-align: right;
        }

        .button {
            background: var(--anthropic-orange);
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.18s ease;
            width: 100%;
            font-family: 'Poppins', sans-serif;
        }

        .button:hover { background: #c86641; transform: translateY(-1px); }
        .button:active { transform: translateY(0); }
        .button.secondary { background: var(--anthropic-blue); }
        .button.secondary:hover { background: #5a8bb8; }
        .button.tertiary { background: var(--anthropic-green); }
        .button.tertiary:hover { background: #6b7b52; }

        .button-row { display: flex; gap: 8px; }
        .button-row .button { flex: 1; }

        .divider {
            height: 1px;
            background: var(--anthropic-light-gray);
            margin: 20px 0;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            margin-bottom: 6px;
        }

        .stat-row span:last-child {
            font-family: 'Courier New', monospace;
            color: var(--anthropic-dark);
        }

        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
        }

        #canvas-container {
            width: 100%;
            max-width: 900px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 24px 48px rgba(20,20,19,0.18);
        }

        #canvas-container canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 500px;
            font-size: 15px;
            color: var(--anthropic-mid-gray);
            background: #030508;
            color: #444;
        }

        @media (max-width: 700px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- ── Sidebar ── -->
    <div class="sidebar">
        <h1>Murmuration</h1>
        <div class="subtitle">Three rules. Ten thousand agents. One collective mind emerging from algorithmic silence.</div>

        <!-- Seed -->
        <div class="control-section">
            <h3>Seed</h3>
            <input type="number" id="seed-input" class="seed-input" value="12345" onchange="updateSeed()">
            <div class="seed-controls">
                <button class="button secondary" onclick="previousSeed()">← Prev</button>
                <button class="button secondary" onclick="nextSeed()">Next →</button>
            </div>
            <button class="button tertiary" onclick="randomSeedAndUpdate()">↻ Random</button>
        </div>

        <!-- Parameters -->
        <div class="control-section">
            <h3>Parameters</h3>

            <div class="control-group">
                <label>Population <span class="hint">agents</span></label>
                <div class="slider-container">
                    <input type="range" id="population" min="100" max="1400" step="50" value="700"
                        oninput="updateParam('population', +this.value)">
                    <span class="value-display" id="population-value">700</span>
                </div>
            </div>

            <div class="control-group">
                <label>Perception <span class="hint">awareness radius</span></label>
                <div class="slider-container">
                    <input type="range" id="perception" min="20" max="110" step="5" value="55"
                        oninput="updateParam('perception', +this.value)">
                    <span class="value-display" id="perception-value">55</span>
                </div>
            </div>

            <div class="control-group">
                <label>Separation <span class="hint">avoid crowding</span></label>
                <div class="slider-container">
                    <input type="range" id="separation" min="0.2" max="3.5" step="0.1" value="1.8"
                        oninput="updateParam('separation', +this.value)">
                    <span class="value-display" id="separation-value">1.8</span>
                </div>
            </div>

            <div class="control-group">
                <label>Alignment <span class="hint">follow heading</span></label>
                <div class="slider-container">
                    <input type="range" id="alignment" min="0.1" max="3.0" step="0.1" value="1.0"
                        oninput="updateParam('alignment', +this.value)">
                    <span class="value-display" id="alignment-value">1.0</span>
                </div>
            </div>

            <div class="control-group">
                <label>Cohesion <span class="hint">flock together</span></label>
                <div class="slider-container">
                    <input type="range" id="cohesion" min="0.1" max="2.5" step="0.1" value="0.7"
                        oninput="updateParam('cohesion', +this.value)">
                    <span class="value-display" id="cohesion-value">0.7</span>
                </div>
            </div>

            <div class="control-group">
                <label>Wind <span class="hint">atmospheric drift</span></label>
                <div class="slider-container">
                    <input type="range" id="windStrength" min="0" max="1.0" step="0.05" value="0.25"
                        oninput="updateParam('windStrength', +this.value)">
                    <span class="value-display" id="windStrength-value">0.25</span>
                </div>
            </div>

            <div class="control-group">
                <label>Trail Persistence <span class="hint">memory</span></label>
                <div class="slider-container">
                    <input type="range" id="trailFade" min="4" max="40" step="1" value="14"
                        oninput="updateParam('trailFade', +this.value)">
                    <span class="value-display" id="trailFade-value">14</span>
                </div>
            </div>

            <div class="control-group">
                <label>Speed <span class="hint">max velocity</span></label>
                <div class="slider-container">
                    <input type="range" id="maxSpeed" min="1.0" max="6.0" step="0.2" value="3.2"
                        oninput="updateParam('maxSpeed', +this.value)">
                    <span class="value-display" id="maxSpeed-value">3.2</span>
                </div>
            </div>
        </div>

        <!-- Live Stats -->
        <div class="control-section">
            <h3>Live</h3>
            <div class="stat-row">
                <span>Frame</span>
                <span id="stat-frame">0</span>
            </div>
            <div class="stat-row">
                <span>FPS</span>
                <span id="stat-fps">—</span>
            </div>
        </div>

        <!-- Actions -->
        <div class="control-section">
            <h3>Actions</h3>
            <div class="button-row" style="margin-bottom:8px">
                <button class="button" onclick="resetParameters()">Reset</button>
                <button class="button secondary" onclick="triggerSave()">Save PNG</button>
            </div>
        </div>

    </div>

    <!-- ── Canvas ── -->
    <div class="canvas-area">
        <div id="canvas-container">
            <div class="loading">Initializing flock…</div>
        </div>
    </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// MURMURATION — Emergent Collective Intelligence
// Boids flocking: separation × alignment × cohesion
// Spatial hash grid for O(n) neighbor queries
// Additive luminance accumulation for trail rendering
// ═══════════════════════════════════════════════════════════════════════════

const W = 1200, H = 1200;
let doSave = false;

let params = {
    seed: 12345,
    population: 700,
    perception: 55,
    separation: 1.8,
    alignment: 1.0,
    cohesion: 0.7,
    windStrength: 0.25,
    trailFade: 14,
    maxSpeed: 3.2
};

const defaultParams = { ...params };

let boids = [];
let grid;
let windT = 0;
let frameCounter = 0;
let lastFpsTime = 0, fpsCounter = 0;


// ─── Spatial Hash Grid ────────────────────────────────────────────────────

class SpatialGrid {
    constructor(cs) {
        this.cs = cs;
        this.cells = new Map();
    }

    clear() { this.cells.clear(); }

    _key(x, y) {
        return (Math.floor(x / this.cs) * 1000) + Math.floor(y / this.cs);
    }

    insert(b) {
        let k = this._key(b.pos.x, b.pos.y);
        if (!this.cells.has(k)) this.cells.set(k, []);
        this.cells.get(k).push(b);
    }

    query(x, y, r) {
        let out = [];
        let cs = this.cs;
        let x0 = Math.floor((x - r) / cs), x1 = Math.floor((x + r) / cs);
        let y0 = Math.floor((y - r) / cs), y1 = Math.floor((y + r) / cs);
        for (let cx = x0; cx <= x1; cx++) {
            for (let cy = y0; cy <= y1; cy++) {
                let k = cx * 1000 + cy;
                let arr = this.cells.get(k);
                if (arr) for (let b of arr) out.push(b);
            }
        }
        return out;
    }
}


// ─── Boid ─────────────────────────────────────────────────────────────────

class Boid {
    constructor() {
        this.pos = createVector(random(W), random(H));
        this.vel = p5.Vector.random2D().mult(random(1.5, params.maxSpeed));
        this.acc = createVector(0, 0);
        // Subtle genetic variation (conceptual seed: each agent has a personality weight)
        this.bias = random(-0.08, 0.08);
    }

    update() {
        let r = params.perception;
        let candidates = grid.query(this.pos.x, this.pos.y, r);

        let sepX = 0, sepY = 0, sepN = 0;
        let aliX = 0, aliY = 0, aliN = 0;
        let cohX = 0, cohY = 0, cohN = 0;
        let sepR = r * 0.40;

        for (let other of candidates) {
            if (other === this) continue;
            let dx = other.pos.x - this.pos.x;
            let dy = other.pos.y - this.pos.y;
            let d2 = dx * dx + dy * dy;

            if (d2 < r * r && d2 > 0) {
                let d = Math.sqrt(d2);

                // Alignment
                aliX += other.vel.x; aliY += other.vel.y; aliN++;

                // Cohesion
                cohX += other.pos.x; cohY += other.pos.y; cohN++;

                // Separation (inverse-distance weighted)
                if (d < sepR) {
                    let w = 1 / d;
                    sepX -= dx * w; sepY -= dy * w; sepN++;
                }
            }
        }

        let ms = params.maxSpeed;
        let limit = 0.08;

        // Apply separation
        if (sepN > 0) {
            let mag = Math.sqrt(sepX*sepX + sepY*sepY) || 1;
            let scale = (ms / mag - 1) * limit;
            let fx = (sepX / mag * ms - this.vel.x) * limit;
            let fy = (sepY / mag * ms - this.vel.y) * limit;
            let fl = Math.sqrt(fx*fx + fy*fy);
            if (fl > 0.15) { fx = fx/fl*0.15; fy = fy/fl*0.15; }
            this.acc.x += fx * params.separation;
            this.acc.y += fy * params.separation;
        }

        // Apply alignment
        if (aliN > 0) {
            let avx = aliX / aliN, avy = aliY / aliN;
            let am = Math.sqrt(avx*avx + avy*avy) || 1;
            let fx = (avx/am*ms - this.vel.x) * limit;
            let fy = (avy/am*ms - this.vel.y) * limit;
            let fl = Math.sqrt(fx*fx + fy*fy);
            if (fl > 0.1) { fx = fx/fl*0.1; fy = fy/fl*0.1; }
            this.acc.x += fx * params.alignment;
            this.acc.y += fy * params.alignment;
        }

        // Apply cohesion
        if (cohN > 0) {
            let cx = cohX / cohN - this.pos.x;
            let cy = cohY / cohN - this.pos.y;
            let cm = Math.sqrt(cx*cx + cy*cy) || 1;
            let fx = (cx/cm*ms - this.vel.x) * limit;
            let fy = (cy/cm*ms - this.vel.y) * limit;
            let fl = Math.sqrt(fx*fx + fy*fy);
            if (fl > 0.1) { fx = fx/fl*0.1; fy = fy/fl*0.1; }
            this.acc.x += fx * params.cohesion;
            this.acc.y += fy * params.cohesion;
        }

        // Perlin wind field (slow coherent drift)
        if (params.windStrength > 0) {
            let wa = noise(this.pos.x * 0.0015, this.pos.y * 0.0015, windT) * TWO_PI * 4;
            this.acc.x += Math.cos(wa) * params.windStrength * 0.07;
            this.acc.y += Math.sin(wa) * params.windStrength * 0.07;
        }

        // Subtle individual bias (creates personality within the flock)
        this.acc.x += this.bias * 0.04;

        // Soft boundary repulsion
        let m = 85;
        let ef = 0.5;
        if (this.pos.x < m)     this.acc.x += ef * (1 - this.pos.x / m);
        if (this.pos.x > W - m) this.acc.x -= ef * (1 - (W - this.pos.x) / m);
        if (this.pos.y < m)     this.acc.y += ef * (1 - this.pos.y / m);
        if (this.pos.y > H - m) this.acc.y -= ef * (1 - (H - this.pos.y) / m);

        // Integrate
        this.vel.x += this.acc.x;
        this.vel.y += this.acc.y;

        // Clamp speed
        let spd = Math.sqrt(this.vel.x*this.vel.x + this.vel.y*this.vel.y);
        if (spd > ms) { this.vel.x = this.vel.x/spd*ms; this.vel.y = this.vel.y/spd*ms; }
        if (spd < 0.9) { this.vel.x = this.vel.x/spd*0.9; this.vel.y = this.vel.y/spd*0.9; }

        this.pos.x += this.vel.x;
        this.pos.y += this.vel.y;
        this.acc.set(0, 0);

        // Hard clamp
        this.pos.x = constrain(this.pos.x, 1, W-1);
        this.pos.y = constrain(this.pos.y, 1, H-1);
    }

    draw() {
        let spd = Math.sqrt(this.vel.x*this.vel.x + this.vel.y*this.vel.y);
        let angle = Math.atan2(this.vel.y, this.vel.x);

        // Heading angle → hue (warm amber going right → cool violet going left)
        // Angle range: -PI to PI  →  hue: 40 to 260 (amber to blue-violet)
        let hue = ((angle + Math.PI) / (Math.PI * 2)) * 280 + 20;
        let sat = map(spd, 0.9, params.maxSpeed, 45, 88);
        let bri = map(spd, 0.9, params.maxSpeed, 60, 100);

        colorMode(HSB, 360, 100, 100, 100);

        // Tail line showing direction and velocity
        let tailLen = map(spd, 0.9, params.maxSpeed, 2.5, 5.5);
        let tx = this.pos.x - this.vel.x / spd * tailLen;
        let ty = this.pos.y - this.vel.y / spd * tailLen;

        stroke(hue, sat, bri, 65);
        strokeWeight(1.3);
        line(tx, ty, this.pos.x, this.pos.y);

        // Bright head dot
        stroke((hue + 25) % 360, sat * 0.65, min(bri + 18, 100), 88);
        strokeWeight(2.4);
        point(this.pos.x, this.pos.y);

        colorMode(RGB);
    }
}


// ─── P5 Core ──────────────────────────────────────────────────────────────

function setup() {
    let canvas = createCanvas(W, H);
    canvas.parent('canvas-container');
    document.querySelector('.loading').style.display = 'none';
    initializeSystem();
}

function initializeSystem() {
    randomSeed(params.seed);
    noiseSeed(params.seed);
    windT = 0;
    frameCounter = 0;

    grid = new SpatialGrid(params.perception);
    boids = [];
    for (let i = 0; i < params.population; i++) boids.push(new Boid());

    background(3, 5, 12);
}

function draw() {
    windT += 0.0022;
    frameCounter++;

    // FPS tracking
    fpsCounter++;
    let now = millis();
    if (now - lastFpsTime >= 1000) {
        document.getElementById('stat-fps').textContent = fpsCounter;
        fpsCounter = 0;
        lastFpsTime = now;
    }
    document.getElementById('stat-frame').textContent = frameCounter;

    // Rebuild spatial grid
    grid.cs = Math.max(params.perception, 20);
    grid.clear();
    for (let b of boids) grid.insert(b);

    // Fade existing trails (normal blend)
    blendMode(BLEND);
    noStroke();
    fill(3, 5, 12, params.trailFade);
    rect(0, 0, W, H);

    // Draw agents with additive light accumulation
    blendMode(ADD);
    for (let b of boids) {
        b.update();
        b.draw();
    }

    blendMode(BLEND);

    if (doSave) {
        saveCanvas('murmuration_' + params.seed, 'png');
        doSave = false;
    }
}


// ─── UI Handlers ──────────────────────────────────────────────────────────

function updateParam(name, value) {
    params[name] = value;
    document.getElementById(name + '-value').textContent = parseFloat(value).toFixed(value % 1 === 0 ? 0 : 2);

    if (name === 'population') {
        randomSeed(params.seed + boids.length);
        while (boids.length < value) boids.push(new Boid());
        if (boids.length > value) boids.length = value;
    }
}

function updateSeedDisplay() {
    document.getElementById('seed-input').value = params.seed;
}

function updateSeed() {
    let v = parseInt(document.getElementById('seed-input').value);
    if (v > 0) { params.seed = v; initializeSystem(); }
    else updateSeedDisplay();
}

function previousSeed() {
    params.seed = Math.max(1, params.seed - 1);
    updateSeedDisplay(); initializeSystem();
}

function nextSeed() {
    params.seed++;
    updateSeedDisplay(); initializeSystem();
}

function randomSeedAndUpdate() {
    params.seed = Math.floor(Math.random() * 999999) + 1;
    updateSeedDisplay(); initializeSystem();
}

function resetParameters() {
    params = { ...defaultParams };

    const sliders = ['population','perception','separation','alignment','cohesion','windStrength','trailFade','maxSpeed'];
    for (let f of sliders) {
        let el = document.getElementById(f);
        if (el) {
            el.value = params[f];
            let v = params[f];
            document.getElementById(f + '-value').textContent = parseFloat(v).toFixed(v % 1 === 0 ? 0 : 2);
        }
    }

    updateSeedDisplay();
    initializeSystem();
}

function triggerSave() { doSave = true; }

window.addEventListener('load', updateSeedDisplay);
</script>
</body>
</html>
